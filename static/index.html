<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Sandbox</title>
    <style>
        /* ---- Reset & Base ---- */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ---- Header ---- */
        header {
            background: #1a1a2e;
            color: #fff;
            padding: 16px 24px;
            font-size: 18px;
            font-weight: 600;
        }

        /* ---- Chat Container ---- */
        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* ---- Message Bubbles ---- */
        .message {
            max-width: 720px;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .message.user {
            align-self: flex-end;
            background: #1a1a2e;
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        .message.assistant {
            align-self: flex-start;
            background: #fff;
            color: #1a1a2e;
            border: 1px solid #e0e0e0;
            border-bottom-left-radius: 4px;
        }

        /* ---- Input Area ---- */
        #input-area {
            display: flex;
            gap: 12px;
            padding: 16px 24px;
            background: #fff;
            border-top: 1px solid #e0e0e0;
        }
        #user-input {
            flex: 1;
            padding: 12px 16px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 8px;
            outline: none;
            resize: none;
            font-family: inherit;
        }
        #user-input:focus { border-color: #1a1a2e; }
        #send-btn {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            background: #1a1a2e;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        #send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <header>Chatbot Sandbox</header>

    <div id="chat"></div>

    <div id="input-area">
        <textarea
            id="user-input"
            rows="1"
            placeholder="Type a message..."
            autofocus
        ></textarea>
        <button id="send-btn">Send</button>
    </div>

    <script>
        // ---- State ---- //
        // We keep the full conversation history so the AI has context
        const messages = [];

        // ---- DOM refs ---- //
        const chatEl   = document.getElementById("chat");
        const inputEl  = document.getElementById("user-input");
        const sendBtn  = document.getElementById("send-btn");

        // ---- Helpers ---- //
        function addMessageBubble(role, text) {
            const div = document.createElement("div");
            div.className = `message ${role}`;
            div.textContent = text;
            chatEl.appendChild(div);
            chatEl.scrollTop = chatEl.scrollHeight;
            return div;
        }

        // ---- Send message & stream response ---- //
        async function sendMessage() {
            const text = inputEl.value.trim();
            if (!text) return;

            // Show user message
            messages.push({ role: "user", content: text });
            addMessageBubble("user", text);
            inputEl.value = "";
            sendBtn.disabled = true;

            // Create empty assistant bubble that we'll fill as tokens arrive
            const bubble = addMessageBubble("assistant", "");

            try {
                const response = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ messages }),
                });

                // Read the SSE stream
                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let assistantText = "";

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    // Decode the chunk and parse SSE lines
                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split("\n");

                    for (const line of lines) {
                        if (line.startsWith("data: ")) {
                            const data = line.slice(6); // Remove "data: " prefix
                            if (data === "[DONE]") break;
                            assistantText += data;
                            bubble.textContent = assistantText;
                            chatEl.scrollTop = chatEl.scrollHeight;
                        }
                    }
                }

                // Save full assistant reply to conversation history
                messages.push({ role: "assistant", content: assistantText });

            } catch (err) {
                bubble.textContent = "Error: Could not reach the server. Is it running?";
                console.error(err);
            }

            sendBtn.disabled = false;
            inputEl.focus();
        }

        // ---- Event Listeners ---- //
        sendBtn.addEventListener("click", sendMessage);
        inputEl.addEventListener("keydown", (e) => {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
