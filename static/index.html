<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Sandbox</title>
    <style>
        :root {
            --bg: #ececec;
            --sidebar-bg: #e4e4e4;
            --panel-border: #d5d5d5;
            --text: #1f1f1f;
            --muted: #7a7a7a;
            --bubble-user: #e5e5e5;
            --bubble-assistant: #f4f4f4;
            --accent: #111111;
            --radius-lg: 18px;
            --radius-md: 12px;
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            height: 100%;
        }

        body {
            font-family: "Soehne", "Helvetica Neue", Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at top center, #f4f4f4 0%, var(--bg) 38%);
            color: var(--text);
            overflow: hidden;
        }

        .app-shell {
            height: 100vh;
            display: flex;
        }

        .sidebar {
            width: 264px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--panel-border);
            display: flex;
            flex-direction: column;
            padding: 10px 8px;
            gap: 16px;
            z-index: 12;
        }

        .sidebar-top,
        .sidebar-bottom {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 8px;
        }

        .brand {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            border: 1px solid #999;
            display: grid;
            place-items: center;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.3px;
        }

        .icon-btn {
            appearance: none;
            border: none;
            background: transparent;
            color: #4a4a4a;
            cursor: pointer;
            border-radius: 9px;
            font-size: 14px;
            height: 30px;
            min-width: 30px;
            padding: 0 8px;
            transition: background 120ms ease;
        }

        .icon-btn svg {
            width: 16px;
            height: 16px;
            stroke: currentColor;
            fill: none;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
            display: block;
        }

        .icon-btn:hover {
            background: rgba(0, 0, 0, 0.06);
        }

        .nav-actions {
            display: grid;
            gap: 2px;
        }

        .nav-item {
            appearance: none;
            border: none;
            background: transparent;
            color: var(--text);
            text-align: left;
            padding: 9px 10px;
            border-radius: 9px;
            font-size: 15px;
            line-height: 1.2;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 9px;
            transition: background 120ms ease;
        }

        .nav-item:hover {
            background: rgba(0, 0, 0, 0.05);
        }

        .nav-item span:first-child {
            width: 18px;
            text-align: center;
            color: #333;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .nav-item span:first-child svg {
            width: 16px;
            height: 16px;
        }

        .threads {
            min-height: 0;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .threads h2 {
            margin: 0;
            color: #8b8b8b;
            font-size: 14px;
            font-weight: 600;
            padding: 0 10px 8px;
        }

        .thread-list {
            list-style: none;
            margin: 0;
            padding: 0;
            overflow-y: auto;
            display: grid;
            gap: 2px;
        }

        .thread-item {
            border: none;
            background: transparent;
            text-align: left;
            border-radius: 10px;
            padding: 10px;
            font-size: 15px;
            color: #1f1f1f;
            cursor: pointer;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: background 120ms ease;
        }

        .thread-item:hover {
            background: rgba(0, 0, 0, 0.05);
        }

        .thread-item.active {
            background: #dcdcdc;
            font-weight: 600;
        }

        .profile {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px;
        }

        .avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #4da3ff;
            color: #fff;
            font-size: 13px;
            display: grid;
            place-items: center;
            flex: none;
        }

        .profile-meta {
            display: grid;
            line-height: 1.1;
            gap: 2px;
        }

        .profile-meta strong {
            font-size: 13px;
            font-weight: 600;
        }

        .profile-meta span {
            color: #7c7c7c;
            font-size: 12px;
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .topbar {
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 18px;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 16px;
        }

        .topbar-left h1 {
            margin: 0;
            font-size: 31px;
            font-weight: 500;
        }

        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .chat-canvas {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 18px 18px 28px;
            position: relative;
        }

        .messages-wrap {
            width: min(760px, 100%);
            flex: 1;
            overflow-y: auto;
            padding: 28px 0 120px;
        }

        .messages {
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        .empty-state {
            width: min(760px, 100%);
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(32px, 4.5vw, 52px);
            font-weight: 500;
            color: #1d1d1d;
            text-align: center;
            animation: fade-in 320ms ease;
        }

        .message {
            animation: fade-in 200ms ease;
        }

        .message.user {
            display: flex;
            justify-content: flex-end;
        }

        .message.user .bubble {
            background: var(--bubble-user);
            padding: 12px 18px;
            border-radius: 999px;
            max-width: min(470px, 90%);
            white-space: pre-wrap;
            line-height: 1.45;
            font-size: 16px;
        }

        .message.assistant {
            display: grid;
            gap: 12px;
        }

        .message.assistant .bubble {
            background: transparent;
            white-space: pre-wrap;
            line-height: 1.55;
            font-size: 15px;
            max-width: min(680px, 100%);
        }

        .assistant-actions {
            display: flex;
            align-items: center;
            gap: 6px;
            opacity: 0.75;
        }

        .assistant-actions .icon-btn {
            border: 1px solid transparent;
        }

        .assistant-actions .icon-btn:hover {
            border-color: #d2d2d2;
            background: #efefef;
        }

        .bubble.streaming::after {
            content: "|";
            margin-left: 2px;
            animation: blink 0.8s step-end infinite;
        }

        .composer-wrap {
            width: min(760px, 100%);
            position: absolute;
            left: 50%;
            bottom: 26px;
            transform: translateX(-50%);
        }

        .composer {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            background: #f3f3f3;
            border: 1px solid #cdcdcd;
            border-radius: 28px;
            padding: 10px 12px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.07);
        }

        .composer textarea {
            flex: 1;
            border: none;
            background: transparent;
            font: inherit;
            font-size: 16px;
            resize: none;
            max-height: 140px;
            min-height: 28px;
            line-height: 1.5;
            color: var(--text);
            outline: none;
            padding: 5px 0;
        }

        .composer textarea::placeholder {
            color: #8a8a8a;
        }

        .send-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: var(--accent);
            color: #fff;
            cursor: pointer;
            font-size: 17px;
            display: grid;
            place-items: center;
            transition: opacity 120ms ease;
        }

        .send-btn svg {
            width: 16px;
            height: 16px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .ghost {
            color: #575757;
        }

        .mobile-toggle {
            display: none;
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }

        @keyframes fade-in {
            from {
                opacity: 0;
                transform: translateY(3px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 980px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                height: 100vh;
                transform: translateX(-100%);
                transition: transform 160ms ease;
            }

            body.sidebar-open .sidebar {
                transform: translateX(0);
            }

            .mobile-toggle {
                display: inline-grid;
                place-items: center;
            }

            .chat-canvas {
                padding: 8px 12px 24px;
            }

            .messages-wrap {
                padding-top: 14px;
            }

            .topbar-left h1 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="app-shell">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-top">
                <div class="brand">AI</div>
                <button class="icon-btn" aria-label="Collapse sidebar">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                        <rect x="3" y="5" width="18" height="14" rx="2"></rect>
                        <line x1="10" y1="5" x2="10" y2="19"></line>
                    </svg>
                </button>
            </div>

            <div class="nav-actions">
                <button class="nav-item" id="new-chat-btn">
                    <span>
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M12 20h9"></path>
                            <path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"></path>
                        </svg>
                    </span>
                    <span>New chat</span>
                </button>
                <button class="nav-item">
                    <span>
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <circle cx="11" cy="11" r="7"></circle>
                            <line x1="16.65" y1="16.65" x2="21" y2="21"></line>
                        </svg>
                    </span>
                    <span>Search chats</span>
                </button>
                <button class="nav-item">
                    <span>
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <rect x="3" y="4" width="18" height="16" rx="2"></rect>
                            <circle cx="8.5" cy="9" r="1.5"></circle>
                            <path d="M21 16l-5-5-5 5-2-2-6 6"></path>
                        </svg>
                    </span>
                    <span>Images</span>
                </button>
                <button class="nav-item">
                    <span>
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <rect x="4" y="4" width="6" height="6" rx="1"></rect>
                            <rect x="14" y="4" width="6" height="6" rx="1"></rect>
                            <rect x="4" y="14" width="6" height="6" rx="1"></rect>
                            <rect x="14" y="14" width="6" height="6" rx="1"></rect>
                        </svg>
                    </span>
                    <span>Apps</span>
                </button>
                <button class="nav-item">
                    <span>
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <polyline points="4 7 12 7 12 17 20 17"></polyline>
                            <polyline points="8 11 12 7 16 11"></polyline>
                        </svg>
                    </span>
                    <span>Codex</span>
                </button>
                <button class="nav-item">
                    <span>
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M3 7a2 2 0 0 1 2-2h5l2 2h7a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
                        </svg>
                    </span>
                    <span>Projects</span>
                </button>
            </div>

            <section class="threads">
                <h2>Your chats</h2>
                <ul class="thread-list" id="thread-list"></ul>
            </section>

            <div class="sidebar-bottom">
                <div class="profile">
                    <div class="avatar">NT</div>
                    <div class="profile-meta">
                        <strong>Nhat Tran</strong>
                        <span>Free</span>
                    </div>
                </div>
            </div>
        </aside>

        <main class="main">
            <header class="topbar">
                <div class="topbar-left">
                    <button class="icon-btn mobile-toggle" id="mobile-toggle" aria-label="Toggle sidebar">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <line x1="4" y1="7" x2="20" y2="7"></line>
                            <line x1="4" y1="12" x2="20" y2="12"></line>
                            <line x1="4" y1="17" x2="20" y2="17"></line>
                        </svg>
                    </button>
                    <h1>QubicGPT</h1>
                </div>

                <div class="topbar-actions">
                    <button class="icon-btn" aria-label="Share">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <path d="M12 16V4"></path>
                            <polyline points="7 9 12 4 17 9"></polyline>
                            <path d="M5 20h14"></path>
                        </svg>
                    </button>
                    <button class="icon-btn" aria-label="More options">
                        <svg viewBox="0 0 24 24" aria-hidden="true">
                            <circle cx="6" cy="12" r="1"></circle>
                            <circle cx="12" cy="12" r="1"></circle>
                            <circle cx="18" cy="12" r="1"></circle>
                        </svg>
                    </button>
                </div>
            </header>

            <section class="chat-canvas">
                <div class="empty-state" id="empty-state">What are you working on?</div>

                <div class="messages-wrap" id="messages-wrap" hidden>
                    <div class="messages" id="messages"></div>
                </div>

                <div class="composer-wrap">
                    <form class="composer" id="composer">
                        <button type="button" class="icon-btn ghost" aria-label="Attach">
                            <svg viewBox="0 0 24 24" aria-hidden="true">
                                <line x1="12" y1="5" x2="12" y2="19"></line>
                                <line x1="5" y1="12" x2="19" y2="12"></line>
                            </svg>
                        </button>
                        <textarea id="user-input" placeholder="Ask anything" rows="1"></textarea>
                        <button type="button" class="icon-btn ghost" aria-label="Voice">
                            <svg viewBox="0 0 24 24" aria-hidden="true">
                                <rect x="9" y="3" width="6" height="12" rx="3"></rect>
                                <path d="M6 11a6 6 0 0 0 12 0"></path>
                                <line x1="12" y1="17" x2="12" y2="21"></line>
                            </svg>
                        </button>
                        <button type="submit" class="send-btn" id="send-btn" aria-label="Send">
                            <svg viewBox="0 0 24 24" aria-hidden="true">
                                <line x1="12" y1="19" x2="12" y2="5"></line>
                                <polyline points="7 10 12 5 17 10"></polyline>
                            </svg>
                        </button>
                    </form>
                </div>
            </section>
        </main>
    </div>

    <script>
        const STORAGE_KEY = "chatbot_sandbox_threads_v1";

        const threadListEl = document.getElementById("thread-list");
        const messagesEl = document.getElementById("messages");
        const emptyStateEl = document.getElementById("empty-state");
        const messagesWrapEl = document.getElementById("messages-wrap");
        const inputEl = document.getElementById("user-input");
        const sendBtnEl = document.getElementById("send-btn");
        const newChatBtnEl = document.getElementById("new-chat-btn");
        const composerEl = document.getElementById("composer");
        const mobileToggleEl = document.getElementById("mobile-toggle");

        const state = {
            threads: [],
            activeThreadId: null,
            sending: false,
        };

        function nowId() {
            return `${Date.now()}-${Math.random().toString(36).slice(2, 8)}`;
        }

        function truncateTitle(text) {
            if (!text) return "New chat";
            const normalized = text.replace(/\s+/g, " ").trim();
            if (!normalized) return "New chat";
            return normalized.length > 34 ? `${normalized.slice(0, 34)}...` : normalized;
        }

        function seedThreads() {
            return [
                { id: nowId(), title: "Greetings and Well-being", messages: [] },
                { id: nowId(), title: "Video Summary Request", messages: [] },
                { id: nowId(), title: "Example chat: Easy uploads", messages: [] },
                { id: nowId(), title: "Example chat: Picture this", messages: [] },
                { id: nowId(), title: "Example chat: Ask anything", messages: [] },
            ];
        }

        function saveState() {
            localStorage.setItem(
                STORAGE_KEY,
                JSON.stringify({
                    threads: state.threads,
                    activeThreadId: state.activeThreadId,
                })
            );
        }

        function loadState() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (!raw) {
                    state.threads = seedThreads();
                    state.activeThreadId = state.threads[0]?.id ?? null;
                    return;
                }

                const parsed = JSON.parse(raw);
                state.threads = Array.isArray(parsed.threads) ? parsed.threads : seedThreads();
                state.activeThreadId = parsed.activeThreadId || state.threads[0]?.id || null;

                if (!state.threads.length) {
                    state.threads = seedThreads();
                    state.activeThreadId = state.threads[0]?.id ?? null;
                }
            } catch {
                state.threads = seedThreads();
                state.activeThreadId = state.threads[0]?.id ?? null;
            }
        }

        function getActiveThread() {
            return state.threads.find((thread) => thread.id === state.activeThreadId) || null;
        }

        function createThread(prefillTitle = "New chat") {
            const thread = {
                id: nowId(),
                title: truncateTitle(prefillTitle),
                messages: [],
            };
            state.threads.unshift(thread);
            state.activeThreadId = thread.id;
            saveState();
            render();
            return thread;
        }

        function switchThread(threadId) {
            state.activeThreadId = threadId;
            saveState();
            render();
            if (window.innerWidth <= 980) {
                document.body.classList.remove("sidebar-open");
            }
        }

        function renderThreadList() {
            threadListEl.innerHTML = "";

            for (const thread of state.threads) {
                const li = document.createElement("li");
                const btn = document.createElement("button");
                btn.className = "thread-item";
                if (thread.id === state.activeThreadId) {
                    btn.classList.add("active");
                }
                btn.textContent = thread.title || "New chat";
                btn.addEventListener("click", () => switchThread(thread.id));
                li.appendChild(btn);
                threadListEl.appendChild(li);
            }
        }

        function createAssistantActions() {
            const actions = document.createElement("div");
            actions.className = "assistant-actions";
            const icons = [
                {
                    label: "Copy",
                    svg: '<svg viewBox="0 0 24 24" aria-hidden="true"><rect x="9" y="9" width="10" height="10" rx="2"></rect><path d="M15 9V7a2 2 0 0 0-2-2H7a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"></path></svg>',
                },
                {
                    label: "Like",
                    svg: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 11v9H4v-9z"></path><path d="M10 20h7a2 2 0 0 0 2-1.6l1-5A2 2 0 0 0 18 11h-4l.5-3.2a2 2 0 0 0-3.7-1.4L8 11v9"></path></svg>',
                },
                {
                    label: "Dislike",
                    svg: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M17 13V4h3v9z"></path><path d="M14 4H7a2 2 0 0 0-2 1.6l-1 5A2 2 0 0 0 6 13h4l-.5 3.2a2 2 0 0 0 3.7 1.4L16 13V4"></path></svg>',
                },
                {
                    label: "Share",
                    svg: '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 16V5"></path><polyline points="7 10 12 5 17 10"></polyline><path d="M5 20h14"></path></svg>',
                },
                {
                    label: "Regenerate",
                    svg: '<svg viewBox="0 0 24 24" aria-hidden="true"><polyline points="4 4 4 10 10 10"></polyline><path d="M20 12a8 8 0 0 0-14-5"></path><polyline points="20 20 20 14 14 14"></polyline><path d="M4 12a8 8 0 0 0 14 5"></path></svg>',
                },
                {
                    label: "More",
                    svg: '<svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="6" cy="12" r="1"></circle><circle cx="12" cy="12" r="1"></circle><circle cx="18" cy="12" r="1"></circle></svg>',
                },
            ];
            for (const icon of icons) {
                const button = document.createElement("button");
                button.type = "button";
                button.className = "icon-btn";
                button.setAttribute("aria-label", icon.label);
                button.innerHTML = icon.svg;
                actions.appendChild(button);
            }
            return actions;
        }

        function createMessageNode(role, text, streaming = false) {
            const wrapper = document.createElement("div");
            wrapper.className = `message ${role}`;

            const bubble = document.createElement("div");
            bubble.className = "bubble";
            if (streaming) {
                bubble.classList.add("streaming");
            }
            bubble.textContent = text;

            wrapper.appendChild(bubble);

            if (role === "assistant") {
                wrapper.appendChild(createAssistantActions());
            }

            return { wrapper, bubble };
        }

        function renderMessages() {
            const thread = getActiveThread();
            messagesEl.innerHTML = "";

            if (!thread || !thread.messages.length) {
                emptyStateEl.hidden = false;
                messagesWrapEl.hidden = true;
                return;
            }

            emptyStateEl.hidden = true;
            messagesWrapEl.hidden = false;

            for (const message of thread.messages) {
                const { wrapper } = createMessageNode(message.role, message.content, false);
                messagesEl.appendChild(wrapper);
            }

            messagesWrapEl.scrollTop = messagesWrapEl.scrollHeight;
        }

        function render() {
            renderThreadList();
            renderMessages();
        }

        function autosizeInput() {
            inputEl.style.height = "auto";
            inputEl.style.height = `${Math.min(inputEl.scrollHeight, 140)}px`;
        }

        function setSending(isSending) {
            state.sending = isSending;
            sendBtnEl.disabled = isSending;
            inputEl.disabled = isSending;
        }

        function parseSseParts(buffer) {
            const parts = buffer.split("\n\n");
            return {
                segments: parts.slice(0, -1),
                remainder: parts[parts.length - 1] || "",
            };
        }

        async function sleep(ms) {
            return new Promise((resolve) => setTimeout(resolve, ms));
        }

        async function sendMessage() {
            if (state.sending) return;

            const text = inputEl.value.trim();
            if (!text) return;

            let thread = getActiveThread();
            if (!thread) {
                thread = createThread(text);
            }

            if (!thread.messages.length || thread.title === "New chat") {
                thread.title = truncateTitle(text);
                renderThreadList();
            }

            thread.messages.push({ role: "user", content: text });

            inputEl.value = "";
            autosizeInput();
            setSending(true);

            emptyStateEl.hidden = true;
            messagesWrapEl.hidden = false;

            const userNode = createMessageNode("user", text, false);
            messagesEl.appendChild(userNode.wrapper);

            const assistantNode = createMessageNode("assistant", "", true);
            messagesEl.appendChild(assistantNode.wrapper);
            messagesWrapEl.scrollTop = messagesWrapEl.scrollHeight;

            const tokenQueue = [];
            let streamDone = false;
            let assistantText = "";

            try {
                const response = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ messages: thread.messages }),
                });

                if (!response.ok || !response.body) {
                    throw new Error(`Request failed with status ${response.status}`);
                }

                const readerPromise = (async () => {
                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();
                    let buffer = "";

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;

                        buffer += decoder.decode(value, { stream: true });
                        const parsed = parseSseParts(buffer);
                        buffer = parsed.remainder;

                        for (const part of parsed.segments) {
                            const lines = part.split("\n");
                            for (const line of lines) {
                                if (!line.startsWith("data: ")) continue;
                                const token = line.slice(6);
                                if (token === "[DONE]") continue;
                                tokenQueue.push(token);
                            }
                        }
                    }

                    streamDone = true;
                })();

                while (!streamDone || tokenQueue.length > 0) {
                    if (tokenQueue.length > 0) {
                        assistantText += tokenQueue.shift();
                        assistantNode.bubble.textContent = assistantText;
                        messagesWrapEl.scrollTop = messagesWrapEl.scrollHeight;
                    }
                    await sleep(50);
                }

                await readerPromise;

                assistantNode.bubble.classList.remove("streaming");
                thread.messages.push({ role: "assistant", content: assistantText });
                saveState();
            } catch (error) {
                assistantNode.bubble.classList.remove("streaming");
                assistantNode.bubble.textContent = "Error: Could not reach the server. Is it running?";
                console.error(error);
            }

            setSending(false);
            inputEl.focus();
        }

        newChatBtnEl.addEventListener("click", () => {
            createThread("New chat");
            inputEl.focus();
        });

        composerEl.addEventListener("submit", (event) => {
            event.preventDefault();
            sendMessage();
        });

        inputEl.addEventListener("input", autosizeInput);

        inputEl.addEventListener("keydown", (event) => {
            if (event.key === "Enter" && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        });

        mobileToggleEl.addEventListener("click", () => {
            document.body.classList.toggle("sidebar-open");
        });

        loadState();
        render();
        autosizeInput();
        inputEl.focus();
    </script>
</body>
</html>
