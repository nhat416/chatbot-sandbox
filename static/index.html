<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot Sandbox</title>
    <style>
        /* ---- Reset & Base ---- */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f5f5;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ---- Header ---- */
        header {
            background: #1a1a2e;
            color: #fff;
            padding: 16px 24px;
            font-size: 18px;
            font-weight: 600;
        }

        /* ---- Chat Container ---- */
        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 24px clamp(24px, 10vw, 160px);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* ---- Message Bubbles ---- */
        .message {
            max-width: 720px;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .message.user {
            align-self: flex-start;
            background: #1a1a2e;
            color: #fff;
            border-bottom-left-radius: 4px;
        }
        .message.assistant {
            align-self: flex-end;
            background: #fff;
            color: #1a1a2e;
            border: 1px solid #e0e0e0;
            border-bottom-right-radius: 4px;
        }

        /* ---- Typing cursor animation ---- */
        .message.assistant.streaming::after {
            content: "\25AE";
            animation: blink 0.6s step-end infinite;
            margin-left: 2px;
        }
        @keyframes blink {
            50% { opacity: 0; }
        }

        /* ---- Input Area ---- */
        #input-area {
            display: flex;
            gap: 12px;
            padding: 16px 24px;
            background: #fff;
            border-top: 1px solid #e0e0e0;
        }
        #user-input {
            flex: 1;
            padding: 12px 16px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 8px;
            outline: none;
            resize: none;
            font-family: inherit;
        }
        #user-input:focus { border-color: #1a1a2e; }
        #send-btn {
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 600;
            background: #1a1a2e;
            color: #fff;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        #send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
    <header>Chatbot Sandbox</header>

    <div id="chat"></div>

    <div id="input-area">
        <textarea
            id="user-input"
            rows="1"
            placeholder="Type a message..."
            autofocus
        ></textarea>
        <button id="send-btn">Send</button>
    </div>

    <script>
        // ---- State ---- //
        // We keep the full conversation history so the AI has context
        const messages = [];

        // ---- DOM refs ---- //
        const chatEl   = document.getElementById("chat");
        const inputEl  = document.getElementById("user-input");
        const sendBtn  = document.getElementById("send-btn");

        // ---- Helpers ---- //
        function addMessageBubble(role, text) {
            const div = document.createElement("div");
            div.className = `message ${role}`;
            div.textContent = text;
            chatEl.appendChild(div);
            chatEl.scrollTop = chatEl.scrollHeight;
            return div;
        }

        // ---- Rendering speed control ---- //
        // Tokens arrive from OpenAI very fast. We queue them and render
        // on a fixed interval so the text appears at a readable pace.
        // Increase RENDER_INTERVAL_MS to slow down, decrease to speed up.
        const RENDER_INTERVAL_MS = 50; // ~50% slower than real-time streaming

        function sleep(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        // ---- Send message & stream response ---- //
        async function sendMessage() {
            const text = inputEl.value.trim();
            if (!text) return;

            // Show user message
            messages.push({ role: "user", content: text });
            addMessageBubble("user", text);
            inputEl.value = "";
            sendBtn.disabled = true;

            // Create empty assistant bubble with a blinking cursor while streaming
            const bubble = addMessageBubble("assistant", "");
            bubble.classList.add("streaming");

            // Token queue: the network reader pushes tokens here,
            // and a separate render loop pops them out on a timer.
            const tokenQueue = [];
            let streamDone = false;

            try {
                const response = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ messages }),
                });

                // Start the network reader — it fills the token queue as fast
                // as OpenAI sends chunks, without rendering anything yet.
                const readerPromise = (async () => {
                    const reader = response.body.getReader();
                    const decoder = new TextDecoder();
                    let buffer = "";

                    while (true) {
                        const { done, value } = await reader.read();
                        if (done) break;

                        buffer += decoder.decode(value, { stream: true });

                        const parts = buffer.split("\n\n");
                        buffer = parts.pop();

                        for (const part of parts) {
                            for (const line of part.split("\n")) {
                                if (!line.startsWith("data: ")) continue;
                                const data = line.slice(6);
                                if (data === "[DONE]") continue;
                                tokenQueue.push(data);
                            }
                        }
                    }
                    streamDone = true;
                })();

                // Render loop — drains the queue one token at a time on a timer.
                // This is what controls the visible typing speed.
                let assistantText = "";
                while (!streamDone || tokenQueue.length > 0) {
                    if (tokenQueue.length > 0) {
                        assistantText += tokenQueue.shift();
                        bubble.textContent = assistantText;
                        chatEl.scrollTop = chatEl.scrollHeight;
                    }
                    await sleep(RENDER_INTERVAL_MS);
                }

                // Wait for the network reader to fully finish
                await readerPromise;

                // Save full assistant reply to conversation history
                messages.push({ role: "assistant", content: assistantText });

            } catch (err) {
                bubble.textContent = "Error: Could not reach the server. Is it running?";
                console.error(err);
            }

            // Remove the blinking cursor once streaming is complete
            bubble.classList.remove("streaming");
            sendBtn.disabled = false;
            inputEl.focus();
        }

        // ---- Event Listeners ---- //
        sendBtn.addEventListener("click", sendMessage);
        inputEl.addEventListener("keydown", (e) => {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
